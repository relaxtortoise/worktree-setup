version: "2"

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell

run:
  tests: true

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

exclusions:
  rules:
    - path: _test\.go
      linters:
        - errcheck

formatters:
  enable:
    - goimports
    - gofmt
