version: "2"

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - goimports
    - misspell
    - gofmt

run:
  tests: true

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck

formatters:
  enable:
    - goimports
    - gofmt
